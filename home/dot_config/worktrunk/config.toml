# worktrunk (wt) user config (managed by chezmoi)
# Global, user-scope preferences. Not project-shared.
# Full reference: `wt config create` template / https://worktrunk.dev/config/

# Create worktrees inside the repo at .worktrees/<branch>.
worktree-path = "{{ repo_path }}/.worktrees/{{ branch | sanitize }}"

# ── Per-repo setup (pre-start: blocking, runs once on new-worktree create) ─────
# Env files are copied from the primary (main) checkout — they're gitignored so
# git doesn't carry them into a new worktree. `; true` keeps a missing file from
# aborting creation. Hooks run non-interactively, hence the explicit fnm init.

# fe-indie-next — Node 24 via fnm (fnm default is 22), pnpm. copy-env runs
# alongside the install step.
[[projects."github.com/IndieCampers/fe-indie-next".pre-start]]
copy-env = 'for f in .env .env.development.local; do [ -f {{ primary_worktree_path }}/$f ] && cp {{ primary_worktree_path }}/$f . ; done; true'
install = 'eval "$(fnm env --shell bash)" && fnm use --install-if-missing && pnpm install'

# goindie-website — Node 18 via fnm, yarn. Copy .env first (translations fetch
# may need it), then install deps and fetch translations.
[[projects."github.com/IndieCampers/goindie-website".pre-start]]
copy-env = '[ -f {{ primary_worktree_path }}/.env ] && cp {{ primary_worktree_path }}/.env . ; true'

[[projects."github.com/IndieCampers/goindie-website".pre-start]]
setup = 'eval "$(fnm env --shell bash)" && fnm use --install-if-missing && yarn install && yarn fetch-unzip-translations'
